<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Motorcity Mouth — Archived Design (Broadsheet)</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .archived-badge {
      position: fixed;
      top: 14px;
      right: -46px;
      background: #8b1a1a;
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 50px;
      transform: rotate(40deg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      z-index: 999;
      pointer-events: none;
    }

    :root {
      --ink: #0d0d0d;
      --paper: #f5f0e8;
      --rule: #1a1a1a;
      --accent: #8b1a1a;
      --muted: #4a4a4a;
      --light-rule: #c8c0b0;
    }

    html { font-size: 18px; scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Libre Baskerville', Georgia, serif;
      padding: 0 60px;
    }

    /* ── TOP STRIP ─────────────────────────────────── */
    .top-strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 3px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      padding: 4px 0;
      font-family: 'Libre Baskerville', serif;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
    }
    .top-strip .ts-date { font-style: italic; text-transform: none; letter-spacing: 0; }

    /* ── MASTHEAD ──────────────────────────────────── */
    .masthead {
      text-align: center;
      padding: 14px 0 10px;
      border-bottom: 4px double var(--rule);
    }
    .masthead h1 {
      font-family: 'Libre Bodoni', serif;
      font-size: clamp(2.8rem, 7vw, 5.8rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.12s;
    }
    .masthead h1:hover { color: var(--accent); }
    .mast-rule {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .mast-rule .line { flex: 1; height: 1px; background: var(--rule); }
    .mast-rule .orn { font-size: 0.85rem; color: var(--accent); }

    /* ── NAV ───────────────────────────────────────── */
    .nav-wrap {
      border-top: 1px solid var(--rule);
      border-bottom: 3px solid var(--rule);
    }
    .nav-hamburger { display: none; }
    nav {
      display: flex;
      justify-content: center;
      list-style: none;
    }
    .nav-item { position: relative; }
    .nav-item a {
      display: block;
      padding: 8px 18px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      border-right: 1px solid var(--light-rule);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .nav-item:first-child a { border-left: 1px solid var(--light-rule); }
    .nav-item a:hover { background: var(--ink); color: var(--paper); }
    .nav-item a.active { background: var(--accent); color: var(--paper); }

    .has-drop > a::after { content: ' ▾'; font-size: 0.5rem; }
    .drop-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--paper);
      border: 1px solid var(--rule);
      border-top: 3px solid var(--accent);
      z-index: 200;
      min-width: 200px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
    }
    .has-drop:hover .drop-menu { display: block; }
    .drop-menu a {
      display: block;
      border-right: none !important;
      border-left: none !important;
      border-bottom: 1px solid #ddd;
      padding: 8px 14px !important;
      font-size: 0.65rem !important;
    }
    .drop-menu a:last-child { border-bottom: none; }

    /* ── ISSUE LINE ────────────────────────────────── */
    .issue-line {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid var(--light-rule);
      font-family: 'Barlow Condensed', serif;
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── FRONT PAGE ────────────────────────────────── */
    .front-wrap { padding-top: 18px; }

    .front-top {
      display: grid;
      grid-template-columns: 3fr 1fr;
      align-items: start;
      gap: 0;
      padding-bottom: 20px;
      margin-bottom: 4px;
      border-bottom: 1px solid var(--light-rule);
    }

    /* Lead story */
    .front-lead {
      padding-right: 24px;
      border-right: 1px solid var(--light-rule);
    }
    .lead-flag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border-top: 2px solid var(--accent);
      padding-top: 7px;
      margin-bottom: 8px;
    }
    .lead-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.2vw, 3.2rem);
      font-weight: 900;
      line-height: 1.13;
      margin-bottom: 10px;
      cursor: pointer;
      transition: color 0.1s;
    }
    .lead-headline:hover { color: var(--accent); }
    .lead-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      max-height: 440px;
      background: #ccc9c0;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .lead-img-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; }
    .lead-deck {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 8px;
      text-align: justify;
      hyphens: auto;
    }
    .lead-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--light-rule);
      margin-bottom: 10px;
    }
    .lead-lede { font-size: 1rem; line-height: 1.75; text-align: justify; hyphens: auto; }
    .lead-excerpt { font-size: 0.92rem; line-height: 1.75; color: var(--muted); margin-top: 10px; text-align: justify; hyphens: auto; }
    .lead-more {
      display: inline-block;
      margin-top: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      border-bottom: 1px solid var(--accent);
    }

    /* Sidebar */
    .front-sidebar { padding-left: 20px; }
    .sidebar-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 2px solid var(--rule);
      padding-top: 7px;
      margin-bottom: 14px;
    }
    .sb-story {
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--light-rule);
      cursor: pointer;
    }
    .sb-img { width: 100%; height: 160px; overflow: hidden; margin-bottom: 7px; }
    .sb-img img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; }
    .sb-story:last-child { border-bottom: none; margin-bottom: 0; }
    .sb-flag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      border-top: 2px solid var(--accent);
      padding-top: 5px;
      margin-bottom: 4px;
    }
    .sb-story h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      transition: color 0.1s;
    }
    .sb-story:hover h4 { color: var(--accent); }
    .sb-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.56rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Lower grid */
    .front-lower-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 2px solid var(--rule);
      padding-top: 7px;
      margin: 20px 0 16px;
    }
    .front-lower {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      padding-bottom: 32px;
    }
    .fl-img { width: 100%; height: 180px; overflow: hidden; margin-bottom: 8px; }
    .fl-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .fl-story {
      padding: 0 20px;
      border-right: 1px solid var(--light-rule);
      cursor: pointer;
    }
    .fl-story:first-child { padding-left: 0; }
    .fl-story:last-child { border-right: none; padding-right: 0; }
    .fl-flag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .fl-story h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 6px;
      transition: color 0.1s;
    }
    .fl-story:hover h3 { color: var(--accent); }
    .fl-lede {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--muted);
      text-align: justify;
      hyphens: auto;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .fl-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.56rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── SECTION PAGE ──────────────────────────────── */
    .sec-header {
      text-align: center;
      padding: 22px 0 16px;
      border-bottom: 2px solid var(--rule);
      margin-bottom: 24px;
    }
    .sec-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .sec-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 700;
    }
    .sec-orn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .sec-orn .line { flex: 1; height: 1px; background: var(--rule); }
    .sec-orn .d { font-size: 0.7rem; color: var(--accent); }

    .article-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding-bottom: 40px;
    }
    .a-card {
      padding: 0 20px 28px;
      border-right: 1px solid var(--light-rule);
      cursor: pointer;
    }
    .a-card:nth-child(3n+1) { padding-left: 0; }
    .a-card:nth-child(3n)   { border-right: none; padding-right: 0; }
    .a-card:nth-child(n+4)  { border-top: 1px solid var(--light-rule); padding-top: 24px; }
    .a-card-img {
      width: 100%;
      aspect-ratio: 16/9;
      background: #d5cfc4;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .a-card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .a-card-flag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.56rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }
    .a-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 5px;
      transition: color 0.1s;
    }
    .a-card:hover h3 { color: var(--accent); }
    .a-card-deck {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 6px;
      text-align: justify;
      hyphens: auto;
    }
    .a-card-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── ARTICLE PAGE ──────────────────────────────── */
    .art-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 22px 0 56px;
    }
    .art-crumb {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .art-crumb a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
    .art-crumb a:hover { text-decoration: underline; }
    .art-flag {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border-top: 3px solid var(--accent);
      padding-top: 7px;
      margin-bottom: 12px;
    }
    .art-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 4vw, 3.6rem);
      font-weight: 900;
      line-height: 1.13;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    .art-deck {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 12px;
      text-align: justify;
      hyphens: auto;
    }
    .art-meta {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 14px;
      border-top: 1px solid var(--light-rule);
      border-bottom: 2px solid var(--rule);
      padding-top: 10px;
      margin-bottom: 22px;
    }
    .art-img { width: 100%; height: 540px; overflow: hidden; margin-bottom: 6px; }
    .art-img img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
    .art-caption {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 18px;
      font-style: italic;
    }
    .art-body p {
      font-size: 1.05rem;
      line-height: 1.85;
      margin-bottom: 1.3em;
      text-align: justify;
      hyphens: auto;
    }
    .art-body blockquote {
      border-left: 3px solid var(--accent);
      margin: 0.4em 0 1.4em 0.6em;
      padding: 0.5em 0 0.5em 1.2em;
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 0.98rem;
      line-height: 1.9;
      color: var(--muted);
      text-align: left;
    }
    .art-body .poem-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 1.6em 0 0.3em;
    }
    .art-body p:first-child::first-letter {
      float: left;
      font-family: 'Playfair Display', serif;
      font-size: 3.6rem;
      font-weight: 900;
      line-height: 0.8;
      margin: 6px 6px 0 0;
      color: var(--accent);
    }

    /* ── EMPTY / 404 ───────────────────────────────── */
    .empty {
      text-align: center;
      padding: 64px 0;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 1.1rem;
    }

    /* ── FOOTER ────────────────────────────────────── */
    footer {
      margin-top: 32px;
      border-top: 3px double var(--rule);
      padding: 24px 0 18px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .footer-nav {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-bottom: 14px;
    }
    .footer-nav a {
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      letter-spacing: 0.14em;
    }
    .footer-nav a:hover { color: var(--ink); }
    .footer-copy { text-align: center; }

    /* ── FRONT BOTTOM STRIP ───────────────────────── */
    .front-bottom-strip {
      display: flex;
      align-items: stretch;
      border-top: 3px double var(--rule);
      margin-top: 24px;
    }
    .fbs-astro {
      flex: 0 0 36%;
      padding: 12px 20px 12px 0;
      border-right: 1px solid var(--rule);
    }
    .fbs-astro-img {
      width: 100%;
      height: 120px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .fbs-astro-img img { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; display: block; }
    .fbs-astro-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border-top: 2px solid var(--accent);
      padding-top: 6px;
      margin-bottom: 6px;
    }
    .fbs-astro-sign {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .fbs-astro-symbol { color: var(--accent); margin-right: 4px; }
    .fbs-astro-dates {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-left: 4px;
    }
    .fbs-astro-text {
      font-size: 0.78rem;
      line-height: 1.55;
      color: var(--muted);
      margin-bottom: 7px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-align: justify;
      hyphens: auto;
    }
    .fbs-astro-more {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      display: inline-block;
      border-bottom: 1px solid var(--accent);
    }
    .fbs-weather {
      flex: 1;
      padding: 12px 0 12px 24px;
    }
    .fbs-weather-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border-top: 2px solid var(--accent);
      padding-top: 6px;
      margin-bottom: 8px;
    }
    .fbs-weather-inner {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .fbs-weather-temp {
      font-family: 'Libre Bodoni', serif;
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
      flex-shrink: 0;
    }
    .fbs-weather-details { flex: 1; }
    .fbs-weather-cond {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .fbs-weather-quip {
      font-family: 'Libre Baskerville', serif;
      font-size: 0.8rem;
      font-style: italic;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── RESPONSIVE ────────────────────────────────── */
    @media (max-width: 800px) {
      .front-top { grid-template-columns: 1fr; }
      .front-lead { border-right: none; padding-right: 0; border-bottom: 1px solid var(--light-rule); padding-bottom: 18px; margin-bottom: 16px; }
      .front-sidebar { padding-left: 0; }
      .front-lower { grid-template-columns: 1fr 1fr; }
      .fl-story:nth-child(2n) { border-right: none; padding-right: 0; }
      .fl-story:nth-child(2n+1) { padding-left: 0; }
      .article-grid { grid-template-columns: 1fr 1fr; }
      .a-card:nth-child(3n)   { border-right: 1px solid var(--light-rule); padding-right: 20px; }
      .a-card:nth-child(2n)   { border-right: none; padding-right: 0; }
      .a-card:nth-child(2n+1) { padding-left: 0; }
      .a-card:nth-child(n+3)  { border-top: 1px solid var(--light-rule); padding-top: 24px; }

<!-- Article data: single source of truth. Also loaded via require() by scripts/generate-articles.js -->
<script src="data/articles.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════
// SECTIONS
// ═══════════════════════════════════════════════════════════════

const SECTIONS = [
  { id: 'front',    label: 'Front Page' },
  { id: 'politics', label: 'Politics' },
  { id: 'world',    label: 'World News' },
  { id: 'local',    label: 'Local' },
  { id: 'trending', label: 'Trending' },
  { id: 'columns',  label: 'Weekly Columns', children: [
    { id: 'horrorscopes',    label: "Dave's Horrorscopes" },
  ]},
];

// ═══════════════════════════════════════════════════════════════
// ARTICLES + HORRORSCOPES
// ---------------------------------------------------------------
// Data lives in /data/articles.js (loaded above via <script> tag).
// ARTICLES and HORRORSCOPES globals come from /data/articles.js (loaded via <script> tag above).
// Do not add article data here. Edit /data/articles.js instead.

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════

function leadExcerpt(body, skip = 1, take = 4) {
  const paras = [...body.matchAll(/<p[^>]*>(.*?)<\/p>/gs)]
    .map(m => m[1].replace(/<br\s*\/?>/gi, ' ').replace(/<[^>]+>/g, '').trim())
    .filter(t => t.length > 0);
  return paras.slice(skip, skip + take)
    .map(t => `<p class="lead-excerpt">${t}</p>`).join('');
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function sectionLabel(id) {
  for (const s of SECTIONS) {
    if (s.id === id) return s.label;
    if (s.children) for (const c of s.children) if (c.id === id) return c.label;
  }
  return id;
}

function sectionArticles(id) {
  const parent = SECTIONS.find(s => s.id === id && s.children);
  const results = parent
    ? ARTICLES.filter(a => parent.children.map(c => c.id).includes(a.section))
    : ARTICLES.filter(a => a.section === id);
  return results.slice().sort((a, b) => new Date(b.date) - new Date(a.date));
}

function navigate(path) {
  if (window.location.hash.slice(1) === path) {
    route();
  } else {
    window.location.hash = path;
  }
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════

function renderNav(activeId) {
  const nav = document.getElementById('main-nav');
  nav.innerHTML = SECTIONS.map(s => {
    const parentActive = s.id === activeId || (s.children && s.children.some(c => c.id === activeId));
    if (s.children) {
      return `<div class="nav-item has-drop">
        <a href="#${s.id}" class="${parentActive ? 'active' : ''}">${s.label}</a>
        <div class="drop-menu">
          ${s.children.map(c =>
            `<a href="#${c.id}" class="${c.id === activeId ? 'active' : ''}">${c.label}</a>`
          ).join('')}
        </div>
      </div>`;
    }
    return `<div class="nav-item">
      <a href="#${s.id}" class="${s.id === activeId ? 'active' : ''}">${s.label}</a>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// FRONT PAGE
// ═══════════════════════════════════════════════════════════════

function renderFront() {
  renderNav('front');

  const lead       = ARTICLES.find(a => a.featured) || ARTICLES[0];
  const sidebar    = ARTICLES.filter(a => a.id !== lead.id && a.frontPage).slice(0, 4);
  const shownIds   = new Set([lead.id, ...sidebar.map(a => a.id)]);
  const lower      = ARTICLES.filter(a => !shownIds.has(a.id) && a.frontPage).slice(0, 3);

  const leadImgHtml = lead.image
    ? `<div class="lead-img-wrap"><img src="${esc(lead.image)}" alt="${esc(lead.headline)}"></div>`
    : `<div class="lead-img-wrap"></div>`;

  const sidebarHtml = sidebar.length ? sidebar.map(a => `
    <div class="sb-story" onclick="location.href='articles-alt/${a.id}.html'">
      ${a.image ? `<div class="sb-img"><img src="${esc(a.image)}" alt="${esc(a.headline)}" loading="lazy"></div>` : ''}
      <div class="sb-flag">${esc(sectionLabel(a.section))}</div>
      <h4>${esc(a.headline)}</h4>
      <div class="sb-meta">${esc(a.byline)} &nbsp;·&nbsp; ${esc(a.date)}</div>
    </div>`).join('') : '<p style="font-style:italic;color:var(--muted);font-size:0.8rem;">More stories soon.</p>';

  const lowerHtml = lower.length ? `
    <div class="front-lower-label">More From Today's Edition</div>
    <div class="front-lower">
      ${lower.map(a => `
        <div class="fl-story" onclick="location.href='articles-alt/${a.id}.html'">
          ${a.image ? `<div class="fl-img"><img src="${esc(a.image)}" alt="${esc(a.headline)}" loading="lazy"></div>` : ''}
          <div class="fl-flag">${esc(sectionLabel(a.section))}</div>
          <h3>${esc(a.headline)}</h3>
          <p class="fl-lede">${esc(a.lede)}</p>
          <div class="fl-meta">${esc(a.byline)} &nbsp;·&nbsp; ${esc(a.date)}</div>
        </div>`).join('')}
    </div>` : '';

  const sign       = getCurrentSign();
  const signDates  = SIGN_DATES[sign] || '';
  const blurb      = getSignBlurb(sign);
  const signSymbol = (HORRORSCOPES.signs.find(s => s.key === sign) || {}).symbol || '';
  const bottomStripHtml = `
    <div class="front-bottom-strip">
      <div class="fbs-astro">
        <div class="fbs-astro-img"><img src="images/horrorscopes.jpg" alt="Dave's Horrorscopes" loading="lazy"></div>
        <div class="fbs-astro-label">Dave's Horrorscopes</div>
        <div class="fbs-astro-sign"><span class="fbs-astro-symbol">${signSymbol}</span>${sign}<span class="fbs-astro-dates">${signDates}</span></div>
        <p class="fbs-astro-text">${blurb || 'The stars have seen things. You would not believe.'}</p>
        <span class="fbs-astro-more" onclick="navigate('horrorscopes')">Read All Signs →</span>
      </div>
      <div class="fbs-weather">
        <div class="fbs-weather-label">Detroit Weather</div>
        <div class="fbs-weather-inner">
          <div class="fbs-weather-temp" id="fbs-temp">—°</div>
          <div class="fbs-weather-details">
            <div class="fbs-weather-cond" id="fbs-cond">Loading…</div>
            <div class="fbs-weather-quip" id="fbs-quip"></div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('content').innerHTML = `
    <div class="front-wrap">
      <div class="front-top">
        <div class="front-lead">
          <div class="lead-flag">${esc(sectionLabel(lead.section))}</div>
          <div class="lead-headline" onclick="location.href='articles-alt/${lead.id}.html'">${esc(lead.headline)}</div>
          ${lead.deck ? `<p class="lead-deck">${esc(lead.deck)}</p>` : ''}
          ${leadImgHtml}
          <div class="lead-meta">${esc(lead.byline)} &nbsp;·&nbsp; ${esc(lead.date)}</div>
          <p class="lead-lede">${esc(lead.lede)}</p>
          ${leadExcerpt(lead.body, 1, 3)}
          <span class="lead-more" onclick="location.href='articles-alt/${lead.id}.html'">Continue Reading →</span>
        </div>
        <div class="front-sidebar">
          <div class="sidebar-label">More Stories</div>
          ${sidebarHtml}
        </div>
      </div>
      ${lowerHtml}
      ${bottomStripHtml}
    </div>`;

  fetchWeather();
}

// ═══════════════════════════════════════════════════════════════
// SECTION PAGE
// ═══════════════════════════════════════════════════════════════

function renderSection(id) {
  renderNav(id);
  const label    = sectionLabel(id);
  const articles = sectionArticles(id);

  const specialCards = id === 'columns' ? [`
    <div class="a-card" onclick="navigate('horrorscopes')">
      <div class="a-card-img"><img src="images/horrorscopes.jpg" alt="Dave's Horrorscopes" loading="lazy"></div>
      <div class="a-card-flag">Weekly Column</div>
      <h3>Dave's Horrorscopes</h3>
      <p class="a-card-deck">Weekly cosmic truth from Dave, who is not licensed to practice astrology or anything else.</p>
      <div class="a-card-meta">By Dave &nbsp;·&nbsp; Weekly</div>
    </div>`] : [];

  const allCards = [...specialCards, ...articles.map(a => {
    const img = a.image
      ? `<div class="a-card-img"><img src="${esc(a.image)}" alt="${esc(a.headline)}" loading="lazy"></div>`
      : `<div class="a-card-img"></div>`;
    return `<div class="a-card" onclick="location.href='articles-alt/${a.id}.html'">
      ${img}
      <div class="a-card-flag">${esc(sectionLabel(a.section))}</div>
      <h3>${esc(a.headline)}</h3>
      ${a.deck ? `<p class="a-card-deck">${esc(a.deck)}</p>` : ''}
      <div class="a-card-meta">${esc(a.byline)} &nbsp;·&nbsp; ${esc(a.date)}</div>
    </div>`;
  })];

  const gridHtml = allCards.length
    ? `<div class="article-grid">${allCards.join('')}</div>`
    : `<div class="empty">No articles in this section yet. Check back soon.</div>`;

const SIGN_DATES = {
  ARIES:       'Mar 21 – Apr 19',
  TAURUS:      'Apr 20 – May 20',
  GEMINI:      'May 21 – Jun 20',
  CANCER:      'Jun 21 – Jul 22',
  LEO:         'Jul 23 – Aug 22',
  VIRGO:       'Aug 23 – Sep 22',
  LIBRA:       'Sep 23 – Oct 22',
  SCORPIO:     'Oct 23 – Nov 21',
  SAGITTARIUS: 'Nov 22 – Dec 21',
  CAPRICORN:   'Dec 22 – Jan 19',
  AQUARIUS:    'Jan 20 – Feb 18',
  PISCES:      'Feb 19 – Mar 20',
};

function getCurrentSign() {
  const d = new Date(), m = d.getMonth() + 1, day = d.getDate();
  if ((m===3&&day>=21)||(m===4&&day<=19)) return 'ARIES';
  if ((m===4&&day>=20)||(m===5&&day<=20)) return 'TAURUS';
  if ((m===5&&day>=21)||(m===6&&day<=20)) return 'GEMINI';
  if ((m===6&&day>=21)||(m===7&&day<=22)) return 'CANCER';
  if ((m===7&&day>=23)||(m===8&&day<=22)) return 'LEO';
  if ((m===8&&day>=23)||(m===9&&day<=22)) return 'VIRGO';
  if ((m===9&&day>=23)||(m===10&&day<=22)) return 'LIBRA';
  if ((m===10&&day>=23)||(m===11&&day<=21)) return 'SCORPIO';
  if ((m===11&&day>=22)||(m===12&&day<=21)) return 'SAGITTARIUS';
  if ((m===12&&day>=22)||(m===1&&day<=19)) return 'CAPRICORN';
  if ((m===1&&day>=20)||(m===2&&day<=18)) return 'AQUARIUS';
  return 'PISCES';
}

function getSignBlurb(sign) {
  const s = HORRORSCOPES.signs.find(x => x.key === sign);
  return s ? s.text : '';
}

function classifyWeather(code, windMph, humidity, tempF) {
  let base;
  if (code === 0 || code === 1)                              base = 'Clear';
  else if (code === 2)                                       base = 'Partly Cloudy';
  else if (code === 3)                                       base = 'Overcast';
  else if (code === 45 || code === 48)                       base = 'Fog';
  else if (code >= 51 && code <= 57)                         base = 'Drizzle';
  else if (code === 61 || code === 63 || code === 80 || code === 81) base = 'Rain';
  else if (code === 65 || code === 66 || code === 67 || code === 82) base = 'Heavy Rain';
  else if (code === 71 || code === 73 || code === 77 || code === 85) base = 'Snow';
  else if (code === 75 || code === 86)                       base = 'Heavy Snow';
  else if (code >= 95)                                       base = 'Thunderstorm';
  else                                                       base = 'Overcast';

  // Modifiers only apply when base conditions are benign
  const benign = ['Clear', 'Partly Cloudy', 'Overcast'];
  if (benign.includes(base)) {
    if (tempF > 80 && humidity > 78) return 'Muggy';
    if (windMph > 25)                return 'Windy';
  }
  return base;
}

function getStableQuip(cond) {
  const CACHE_KEY = 'mcm_weather_cache';
  const TWO_HOURS = 2 * 60 * 60 * 1000;
  const now = Date.now();
  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (cached && cached.condition === cond && (now - cached.fetchedAt) < TWO_HOURS) {
      return cached.quip;
    }
  } catch(e) {}
  const quips = WEATHER_QUIPS[cond] || ['Surviving.'];
  const quip = quips[Math.floor(Math.random() * quips.length)];
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ condition: cond, quip, fetchedAt: now }));
  } catch(e) {}
  return quip;
}

async function fetchWeather() {
  const tempEl = document.getElementById('fbs-temp');
  const condEl = document.getElementById('fbs-cond');
  const quipEl = document.getElementById('fbs-quip');
  if (!tempEl || !condEl) return;
  try {
    const res  = await fetch('https://api.open-meteo.com/v1/forecast?latitude=42.3314&longitude=-83.0458&current=temperature_2m,weathercode,wind_speed_10m,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph');
    const data = await res.json();
    const c    = data.current;
    const cond = classifyWeather(c.weathercode, c.wind_speed_10m, c.relative_humidity_2m, c.temperature_2m);
    tempEl.textContent = Math.round(c.temperature_2m) + '°';
    condEl.textContent = cond;
    if (quipEl) quipEl.textContent = getStableQuip(cond);
  } catch(e) {
    if (condEl) condEl.textContent = 'Unknown';
    if (quipEl) quipEl.textContent = 'The weather API is also from Detroit.';
  }
}

// ── TOUCH DROPDOWN SUPPORT ──────────────────────────────────────
// On touch devices, CSS :hover dropdowns don't fire. Use event
// delegation on the nav so it works even after renderNav rebuilds.
document.getElementById('main-nav').addEventListener('touchstart', function(e) {
  const link = e.target.closest('.has-drop > a');
  if (!link) return;
  const item = link.closest('.has-drop');
  const isOpen = item.classList.contains('open');
  // close all
  document.querySelectorAll('.has-drop.open').forEach(el => el.classList.remove('open'));
  if (!isOpen) {
    item.classList.add('open');
    e.preventDefault(); // don't follow the href while toggling
  }
}, { passive: false });

// close open dropdowns when tapping elsewhere
document.addEventListener('touchstart', function(e) {
  if (!e.target.closest('.has-drop')) {
    document.querySelectorAll('.has-drop.open').forEach(el => el.classList.remove('open'));
  }
}, { passive: true });

// ── SHARE ────────────────────────────────────────────────────────
function shareLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    document.querySelectorAll('.share-copy-btn').forEach(btn => {
      btn.classList.add('share-btn--copied');
      const lbl = btn.querySelector('.share-copy-label');
      if (lbl) { lbl.textContent = 'Copied!'; setTimeout(() => { lbl.textContent = 'Copy Link'; }, 1800); }
      setTimeout(() => btn.classList.remove('share-btn--copied'), 1800);
    });
  });
}
